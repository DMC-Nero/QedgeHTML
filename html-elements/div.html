<!DOCTYPE html>
<html lang="en">
        <head>
        <style>
        .myDiv {
          border: 5px outset red;
          background-color: rgb(185, 173, 230);
          text-align: center;
        }
        .myDiv1 {
          border: 7px outset rgb(220, 248, 94);
          background-color: lightblue;
          text-align: center;
        }
        .myDiv2 {
          border: 9px outset rgb(199, 25, 243);
        }
        </style>
        </head>
        <body>
        
        <div class="myDiv">
          <h2>This is a heading in a div element</h2>
          <p>This is some text in a div element.</p>
        </div>
        <div class="myDiv1">
            <div class="myDiv">
                This is a heading
            </div>
            <div class="myDiv2">
                This is some text
            </div>
        </div>
        
        </body>
</html>
