<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * {
            background-color: rgb(70,70,70);
            color: rgb(255,255,255);
        }
        .center {
            text-align: right;
            color:rgb(175, 110, 236);
        }

        #para1 {
            text-align: right;
            color: #98f857;
        }

        #para2 {
            text-align: left;
            color: aquamarine;
        }

        p {
            text-align: center;
            color:rgb(236, 113, 220);
        }
    </style>
</head>
<body>
    <p>Every paragraph will be affected by the styles.</p>
    <p id="para1">Me too!</p>
    <p>And me!</p>
    <h1 id="para2">Nero</h1>
    <h1 class="center">Red and center-aligned heading</h1>
    <p>Red and center-aligned paragraph.</p>
</body>
</html>
