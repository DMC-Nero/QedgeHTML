<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        div p{
            background-color: red;
        }
        div > p {
            background-color: green;
        }
        div + p {
            background-color: cyan;
        }
        div ~ p {
            background-color: yellow;
        }
    </style>
</head>
<body>
<p>Paragraph 1.</p>
<div>
  <p>Paragraph 2.</p>
  <h1><p>wecome</p></h1>
</div>

<p>Paragraph 3.</p>
<code>Some code.</code>
<p>Paragraph 4.</p>
<p>Paragraph 5.</p>
    
</body>
</html>
